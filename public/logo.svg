  <!-- TECHNOLOGIES below -->
  <text x="2" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#94A3B8" letter-spacing="10">TECHNOLOGIES</text>

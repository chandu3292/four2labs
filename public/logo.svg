<svg width="780" height="160" viewBox="0 0 780 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="130" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="line" x1="160" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square with gradient IT -->
  <rect x="4" y="14" width="126" height="126" rx="30" fill="#0F172A"/>
  <rect x="8" y="18" width="118" height="118" rx="27" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- I bar -->
  <rect x="36" y="44" width="16" height="66" rx="5" fill="url(#mark)"/>

  <!-- T top horizontal -->
  <rect x="64" y="44" width="42" height="14" rx="5" fill="url(#mark)"/>

  <!-- T vertical stem -->
  <rect x="78" y="44" width="14" height="66" rx="5" fill="url(#mark)" opacity="0.55"/>

  <!-- Wordmark -->
  <text x="155" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="80" fill="#0F172A" letter-spacing="-1">innolah</text>

  <!-- Gradient underline -->
  <rect x="155" y="112" width="510" height="2" rx="1" fill="url(#line)" opacity="0.2"/>

  <!-- TECHNOLOGIES -->
  <text x="157" y="146" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="21" fill="#94A3B8" letter-spacing="10">TECHNOLOGIES</text>
</svg>
